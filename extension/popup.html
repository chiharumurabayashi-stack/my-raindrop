<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; color: #1a1a1a; background: #fff; width: 300px; padding: 16px; }
h3 { font-size: 14px; font-weight: 500; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
.field { margin-bottom: 10px; }
.field label { display: block; font-size: 11px; color: #999; margin-bottom: 4px; }
.field input, .field select {
  width: 100%; padding: 7px 9px;
  border: 0.5px solid rgba(0,0,0,0.15); border-radius: 7px;
  background: #f5f5f3; font-size: 13px; color: #1a1a1a;
  outline: none; font-family: inherit;
}
.field input:focus, .field select:focus { border-color: rgba(0,0,0,0.35); background: #fff; }
.already { font-size: 11px; color: #f59e0b; margin-top: 4px; display: none; }
/* タグ chip 入力 */
.tag-input-wrap {
  width: 100%; min-height: 36px; padding: 4px 8px;
  border: 0.5px solid rgba(0,0,0,0.15); border-radius: 7px;
  background: #f5f5f3; display: flex; flex-wrap: wrap; gap: 4px;
  align-items: center; cursor: text;
}
.tag-input-wrap:focus-within { border-color: rgba(0,0,0,0.35); background: #fff; }
.tag-chip { display: inline-flex; align-items: center; gap: 2px; font-size: 12px; padding: 2px 6px 2px 8px; border-radius: 99px; background: #e8f0fe; color: #1a56db; }
.tag-chip-remove { background: none; border: none; color: #1a56db; cursor: pointer; font-size: 14px; padding: 0 1px; line-height: 1; }
.tag-text-input { border: none; background: transparent; outline: none; font-size: 13px; color: #1a1a1a; min-width: 80px; flex: 1; padding: 2px 0; font-family: inherit; }
.tag-dropdown {
  background: #fff; border: 0.5px solid rgba(0,0,0,0.15); border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow-y: auto;
  margin-top: 4px; display: none;
}
.tag-dropdown-section { font-size: 10px; color: #bbb; padding: 6px 10px 2px; text-transform: uppercase; letter-spacing: 0.05em; }
.tag-dropdown-item { display: flex; align-items: center; justify-content: space-between; padding: 7px 10px; cursor: pointer; font-size: 13px; }
.tag-dropdown-item:hover { background: #f5f5f3; }
.tag-dropdown-count { font-size: 11px; color: #bbb; }
/* AI */
.btn-ai {
  width: 100%; padding: 8px; border: none; border-radius: 7px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: #fff; font-size: 13px; cursor: pointer; font-family: inherit;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.btn-ai:hover { background: linear-gradient(135deg, #4f46e5, #7c3aed); }
.btn-ai:disabled { opacity: 0.55; cursor: not-allowed; }
.ai-summary {
  font-size: 11px; color: #555; background: #f5f5f3; border-radius: 7px;
  padding: 7px 9px; line-height: 1.6; margin-top: 2px;
}
.actions { display: flex; gap: 8px; margin-top: 14px; }
.btn { flex: 1; padding: 8px; border: 0.5px solid rgba(0,0,0,0.2); border-radius: 7px; background: transparent; font-size: 13px; color: #1a1a1a; cursor: pointer; font-family: inherit; }
.btn:hover { background: #f0f0ee; }
.btn-primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
.btn-primary:hover { background: #333; }
.btn:disabled { opacity: 0.5; cursor: default; }
.status { margin-top: 10px; font-size: 12px; text-align: center; color: #999; min-height: 16px; }
.status.ok { color: #4CAF50; }
.status.err { color: #e53e3e; }
.settings-row { text-align: right; margin-bottom: 10px; }
.settings-link { font-size: 11px; color: #aaa; cursor: pointer; text-decoration: underline; }
.settings-link:hover { color: #555; }
.settings-box { display: none; background: #f5f5f3; border-radius: 7px; padding: 10px; margin-bottom: 10px; }
.settings-box label { font-size: 11px; color: #999; display: block; margin-bottom: 4px; }
.settings-box input { width: 100%; padding: 6px 8px; border: 0.5px solid rgba(0,0,0,0.15); border-radius: 6px; font-size: 12px; background: #fff; outline: none; }
.settings-box .save-key-btn { margin-top: 6px; padding: 5px 10px; font-size: 12px; border: 0.5px solid rgba(0,0,0,0.2); border-radius: 6px; background: #1a1a1a; color: #fff; cursor: pointer; }
</style>
</head>
<body>
<h3>🔖 MyRaindrop に保存</h3>

<div class="settings-row">
  <span class="settings-link" id="settings-toggle">⚙️ AI設定</span>
</div>
<div class="settings-box" id="settings-box">
  <label>Gemini API キー</label>
  <input id="gemini-key-input" type="password" placeholder="AIzaSy...">
  <button class="save-key-btn" id="save-key-btn">保存</button>
</div>

<div class="field" style="margin-bottom:8px">
  <button class="btn-ai" id="btn-ai-fill">✨ AIでタグ・コレクション・要約を自動入力</button>
</div>
<div class="field" id="field-summary" style="display:none">
  <label>AI要約</label>
  <div class="ai-summary" id="ai-summary-text"></div>
</div>

<div class="field">
  <label>URL</label>
  <input id="f-url" type="url">
  <div class="already" id="already-msg">⚠️ このURLはすでに登録されています</div>
</div>
<div class="field">
  <label>タイトル</label>
  <input id="f-title" type="text">
</div>
<div class="field">
  <label>コレクション</label>
  <select id="f-col"><option value="">読み込み中...</option></select>
</div>
<div class="field">
  <label>タグ</label>
  <div class="tag-input-wrap" id="tag-input-wrap">
    <span id="tag-chips"></span>
    <input id="tag-text-input" class="tag-text-input" type="text" placeholder="タグを追加..." autocomplete="off">
  </div>
  <div class="tag-dropdown" id="tag-dropdown"></div>
</div>

<div class="actions">
  <button class="btn" id="btn-cancel">閉じる</button>
  <button class="btn btn-primary" id="btn-save">保存</button>
</div>
<div class="status" id="status"></div>

<script src="popup.js"></script>
</body>
</html>
