<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; color: #1a1a1a; background: #fff; width: 300px; padding: 16px; }
h3 { font-size: 14px; font-weight: 500; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
.field { margin-bottom: 10px; }
.field label { display: block; font-size: 11px; color: #999; margin-bottom: 4px; }
.field input, .field select {
  width: 100%; padding: 7px 9px;
  border: 0.5px solid rgba(0,0,0,0.15); border-radius: 7px;
  background: #f5f5f3; font-size: 13px; color: #1a1a1a;
  outline: none; font-family: inherit;
}
.field input:focus, .field select:focus { border-color: rgba(0,0,0,0.35); background: #fff; }
.already { font-size: 11px; color: #f59e0b; margin-top: 4px; display: none; }
.actions { display: flex; gap: 8px; margin-top: 14px; }
.btn { flex: 1; padding: 8px; border: 0.5px solid rgba(0,0,0,0.2); border-radius: 7px; background: transparent; font-size: 13px; color: #1a1a1a; cursor: pointer; font-family: inherit; }
.btn:hover { background: #f0f0ee; }
.btn-primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
.btn-primary:hover { background: #333; }
.btn:disabled { opacity: 0.5; cursor: default; }
.status { margin-top: 10px; font-size: 12px; text-align: center; color: #999; min-height: 16px; }
.status.ok { color: #4CAF50; }
.status.err { color: #e53e3e; }
</style>
</head>
<body>
<h3>🔖 MyRaindrop に保存</h3>

<div class="field">
  <label>URL</label>
  <input id="f-url" type="url">
  <div class="already" id="already-msg">⚠️ このURLはすでに登録されています</div>
</div>
<div class="field">
  <label>タイトル</label>
  <input id="f-title" type="text">
</div>
<div class="field">
  <label>コレクション</label>
  <select id="f-col"><option value="">読み込み中...</option></select>
</div>
<div class="field">
  <label>タグ（カンマ区切り）</label>
  <input id="f-tags" type="text" placeholder="tech, tool, news">
</div>

<div class="actions">
  <button class="btn" id="btn-cancel">閉じる</button>
  <button class="btn btn-primary" id="btn-save">保存</button>
</div>
<div class="status" id="status"></div>

<script src="popup.js"></script>
</body>
</html>
