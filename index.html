<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyRaindrop — ブックマークマネージャー</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a1a">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MyRaindrop">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:#1a1a1a;background:#f5f5f3}
.app{display:flex;height:100vh;background:#f5f5f3}

/* Sidebar */
.sidebar{width:220px;min-width:220px;background:#fff;border-right:0.5px solid rgba(0,0,0,0.1);display:flex;flex-direction:column;padding:12px 0}
.sidebar-logo{padding:12px 16px 8px;display:flex;align-items:center;gap:8px;font-weight:500;font-size:15px}
.sidebar-label{font-size:11px;color:#999;text-transform:uppercase;letter-spacing:0.06em;padding:8px 12px 4px}
.sidebar-item{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:#555;transition:background 0.1s;margin:0 4px}
.sidebar-item:hover{background:#f0f0ee}
.sidebar-item.active{background:#f0f0ee;color:#1a1a1a;font-weight:500}
.sidebar-item .count{margin-left:auto;font-size:11px;color:#bbb}
.sidebar-item .col-actions{display:none;gap:2px;margin-left:auto}
.sidebar-item:hover .col-actions{display:flex}
.sidebar-item:hover .count{display:none}
.col-btn{width:20px;height:20px;border:none;background:transparent;cursor:pointer;font-size:11px;border-radius:4px;display:flex;align-items:center;justify-content:center;padding:0}
.col-btn:hover{background:rgba(0,0,0,0.08)}
.sidebar-item.drag-over{background:#e8f0fe;border:1.5px dashed #1a56db}
.sidebar-item.col-drag-above{border-top:2px solid #1a56db}
.sidebar-item.col-drag-below{border-bottom:2px solid #1a56db}
.card{cursor:grab}.card:active{cursor:grabbing;opacity:0.7}
.card.card-drag-over{outline:2px solid #1a56db;outline-offset:2px}
.sidebar-spacer{flex:1}
.sidebar-bottom{padding:8px 12px;border-top:0.5px solid rgba(0,0,0,0.08);margin-top:8px}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#fff;border-bottom:0.5px solid rgba(0,0,0,0.1);padding:10px 16px;display:flex;align-items:center;gap:10px}
.search-wrap{flex:1;position:relative}
.search-wrap input{width:100%;padding:7px 12px 7px 32px;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;background:#f5f5f3;font-size:13px;color:#1a1a1a;outline:none}
.search-wrap input:focus{border-color:rgba(0,0,0,0.3);background:#fff}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:#aaa;font-size:13px}
.content{flex:1;overflow-y:auto;padding:16px}

/* Buttons */
.btn{padding:7px 14px;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;background:transparent;font-size:13px;color:#1a1a1a;cursor:pointer;white-space:nowrap;font-family:inherit}
.btn:hover{background:#f0f0ee}
.btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn-primary:hover{background:#333}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-block{width:100%;margin-bottom:6px}

/* Cards */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.card{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:12px;overflow:hidden;position:relative;transition:border-color 0.15s}
.card:hover{border-color:rgba(0,0,0,0.25)}
.card-actions{position:absolute;top:6px;right:6px;display:flex;gap:4px;opacity:0;transition:opacity 0.15s}
.card:hover .card-actions{opacity:1}
.card-action-btn{width:28px;height:28px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.15);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px}
.card-action-btn:hover{background:#f0f0ee}
.card-action-btn.danger:hover{background:#fff0f0}
.card-thumb{height:110px;background:#f5f5f3;display:flex;align-items:center;justify-content:center;font-size:32px}
.card-body{padding:10px}
.card-title{font-size:13px;font-weight:500;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-url{font-size:11px;color:#aaa;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{font-size:11px;padding:2px 7px;border-radius:99px;background:#e8f0fe;color:#1a56db;cursor:pointer}
.tag:hover{background:#d0e2fd}
.card-open-link{font-size:11px;color:#1a56db;text-decoration:none;display:inline-block;margin-top:8px}

/* Status bar */
.status-bar{background:#f5f5f3;border-top:0.5px solid rgba(0,0,0,0.08);padding:8px 16px;display:flex;align-items:center;gap:8px;font-size:12px;color:#888}
.status-dot{width:7px;height:7px;border-radius:50%;background:#ccc;flex-shrink:0;transition:background 0.3s}
.status-dot.synced{background:#4CAF50}
.status-dot.syncing{background:#f59e0b}
.status-dot.error{background:#ef4444}

/* Tags sidebar */
.tag-list{padding:0 8px 0 12px;display:flex;flex-wrap:wrap;gap:4px;flex:1;overflow-y:auto;align-content:flex-start}
/* Context menu */
.ctx-menu{position:fixed;background:#fff;border:0.5px solid rgba(0,0,0,0.12);border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,0.15);padding:4px;z-index:1000;min-width:140px;display:none}
.ctx-menu-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:6px;cursor:pointer;font-size:13px;color:#1a1a1a}
.ctx-menu-item:hover{background:#f0f0ee}
.ctx-menu-item.danger{color:#e53e3e}
.ctx-menu-item.danger:hover{background:#fff0f0}
.ctx-menu-sep{height:0.5px;background:rgba(0,0,0,0.08);margin:3px 0}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:12px;padding:24px;width:420px;max-width:90vw;border:0.5px solid rgba(0,0,0,0.1);box-shadow:0 8px 32px rgba(0,0,0,0.12)}
.modal h3{font-size:16px;font-weight:500;margin-bottom:16px}
.field{margin-bottom:14px;position:relative}
.field label{display:block;font-size:12px;color:#666;margin-bottom:5px}
.field input,.field select{width:100%;padding:8px 10px;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;background:#f5f5f3;font-size:13px;color:#1a1a1a;outline:none;font-family:inherit}
.field input:focus,.field select:focus{border-color:rgba(0,0,0,0.35);background:#fff}
/* Tag chip input */
.tag-input-wrap{width:100%;min-height:36px;padding:4px 8px;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;background:#f5f5f3;display:flex;flex-wrap:wrap;gap:4px;align-items:center;cursor:text}
.tag-input-wrap:focus-within{border-color:rgba(0,0,0,0.35);background:#fff}
.tag-chip{display:inline-flex;align-items:center;gap:2px;font-size:12px;padding:2px 6px 2px 8px;border-radius:99px;background:#e8f0fe;color:#1a56db}
.tag-chip-remove{background:none;border:none;color:#1a56db;cursor:pointer;font-size:14px;padding:0 1px;line-height:1}
.tag-chip-remove:hover{color:#0d47a1}
.tag-input-text{border:none;background:transparent;outline:none;font-size:13px;color:#1a1a1a;min-width:80px;flex:1;padding:2px 0;font-family:inherit}
.tag-dropdown{position:absolute;left:0;right:0;background:#fff;border:0.5px solid rgba(0,0,0,0.15);border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,0.1);max-height:220px;overflow-y:auto;z-index:200;top:100%;margin-top:2px}
.tag-dropdown-section{font-size:11px;color:#999;padding:8px 12px 3px;text-transform:uppercase;letter-spacing:0.05em}
.tag-dropdown-item{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;cursor:pointer;font-size:13px;color:#1a1a1a}
.tag-dropdown-item:hover{background:#f5f5f3}
.tag-dropdown-count{font-size:11px;color:#bbb}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}

.empty{text-align:center;padding:48px 16px;color:#bbb;grid-column:1/-1}
.empty .emoji{font-size:32px;margin-bottom:10px}

/* PWA install banner */
#install-banner{display:none;background:#1a1a1a;color:#fff;padding:10px 16px;font-size:13px;align-items:center;gap:10px;justify-content:space-between}
#install-banner button{padding:5px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.3);background:transparent;color:#fff;cursor:pointer;font-size:12px}
#install-banner button.primary{background:#fff;color:#1a1a1a}

@media (max-width: 600px) {
  .sidebar{display:none}
  .grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div id="install-banner">
  <span>📲 ホーム画面に追加してアプリとして使えます</span>
  <div style="display:flex;gap:8px">
    <button onclick="dismissInstall()">後で</button>
    <button class="primary" onclick="installPWA()">追加する</button>
  </div>
</div>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
      MyRaindrop
    </div>

    <div class="sidebar-label">コレクション</div>
    <div id="collection-list"></div>
    <div style="padding:4px 12px;margin-top:4px">
      <button class="btn btn-sm btn-block" onclick="openAddCollection()">+ 新しいコレクション</button>
    </div>

    <div class="sidebar-label" style="margin-top:8px">タグ</div>
    <div class="tag-list" id="tag-list"></div>

    <div class="sidebar-bottom">
      <button class="btn btn-sm btn-block" onclick="exportJSON()">📥 JSONエクスポート</button>
      <button class="btn btn-sm btn-block" onclick="document.getElementById('import-file').click()">📤 JSONインポート</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importJSON(event)">
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="ブックマークを検索..." id="search-input" oninput="renderCards()">
      </div>
      <button class="btn btn-primary" onclick="openAddModal()">+ 追加</button>
    </div>
    <div class="content">
      <div class="grid" id="card-grid"></div>
    </div>
    <div class="status-bar">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">接続中...</span>
      <span style="margin-left:auto" id="last-saved"></span>
    </div>
  </div>
</div>

<!-- ブックマーク追加・編集モーダル -->
<div id="modal-add" class="modal-bg" style="display:none">
  <div class="modal">
    <h3 id="modal-title">ブックマークを追加</h3>
    <div class="field"><label>URL</label><input id="f-url" type="url" placeholder="https://example.com" oninput="onUrlInput()"></div>
    <div class="field">
      <label>タイトル <span id="title-fetching" style="color:#aaa;font-weight:normal;display:none">取得中...</span></label>
      <input id="f-title" type="text" placeholder="サイト名">
    </div>
    <div class="field"><label>コレクション</label><select id="f-col"></select></div>
    <div class="field" id="field-tags">
      <label>タグ</label>
      <div class="tag-input-wrap" onclick="document.getElementById('f-tags-input').focus()">
        <span id="tag-chips"></span>
        <input id="f-tags-input" class="tag-input-text" type="text" placeholder="タグを追加..." autocomplete="off"
          oninput="onTagInput()" onfocus="showTagDropdown()" onblur="setTimeout(hideTagDropdown,150)" onkeydown="onTagKeydown(event)">
      </div>
      <div class="tag-dropdown" id="tag-dropdown" style="display:none"></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('modal-add')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveBookmark()">保存</button>
    </div>
  </div>
</div>

<!-- 右クリックコンテキストメニュー -->
<div id="ctx-menu" class="ctx-menu">
  <div class="ctx-menu-item" onclick="ctxRename()">✏️ 名前の変更</div>
  <div class="ctx-menu-sep"></div>
  <div class="ctx-menu-item danger" onclick="ctxDelete()">🗑 削除</div>
</div>

<!-- タグ編集モーダル -->
<div id="modal-tag" class="modal-bg" style="display:none">
  <div class="modal">
    <h3>タグを編集</h3>
    <div class="field"><label>タグ名</label><input id="f-tag-name" type="text" onkeydown="if(event.key==='Enter')saveTagRename()"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('modal-tag')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveTagRename()">変更する</button>
    </div>
  </div>
</div>

<!-- コレクション追加モーダル -->
<div id="modal-col" class="modal-bg" style="display:none">
  <div class="modal">
    <h3 id="modal-col-title">新しいコレクション</h3>
    <div class="field"><label>名前</label><input id="f-col-name" type="text" placeholder="例: デザイン参考"></div>
    <div class="field"><label>アイコン（絵文字）</label><input id="f-col-icon" type="text" placeholder="🎨" maxlength="2"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('modal-col')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveCollection()">保存</button>
    </div>
  </div>
</div>

<script>
// ========== Firebase 初期化 ==========
const firebaseConfig = {
  apiKey: "AIzaSyBGcuc2uwBpFWGs31Duj4jIZRdA3Nxg_2Y",
  authDomain: "my-raindrop.firebaseapp.com",
  projectId: "my-raindrop",
  storageBucket: "my-raindrop.firebasestorage.app",
  messagingSenderId: "389386045279",
  appId: "1:389386045279:web:947ede469e10b1f2f198ea",
  measurementId: "G-WXCKSPFTJ7"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const docRef = db.collection('myraindrop').doc('data');

// ========== 定数 ==========
const EMOJIS = ['🌐','📰','🎨','🛠','📺','🎵','📚','🎮','💡','🏷','🔗','⭐'];
const CACHE_KEY = 'myraindrop_cache';
function randEmoji() { return EMOJIS[Math.floor(Math.random() * EMOJIS.length)]; }

// ========== 状態 ==========
let state = {
  bookmarks: [],
  collections: [
    { id: 'all', name: 'すべて', icon: '📌' },
    { id: 'Tech', name: 'Tech', icon: '💻' },
    { id: 'Design', name: 'Design', icon: '🎨' },
    { id: '読み物', name: '読み物', icon: '📰' },
  ],
  activeCollection: 'all',
  activeTag: null,
  editingId: null,
};

// ========== ステータス表示 ==========
function setStatus(text, mode) {
  document.getElementById('status-text').textContent = text;
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot' + (mode ? ' ' + mode : '');
}

// ========== ローカルキャッシュ（オフライン時の表示用） ==========
function saveCache() {
  localStorage.setItem(CACHE_KEY, JSON.stringify({
    bookmarks: state.bookmarks,
    collections: state.collections,
  }));
}

function loadCache() {
  try {
    const c = localStorage.getItem(CACHE_KEY);
    if (c) {
      const d = JSON.parse(c);
      if (d.bookmarks) state.bookmarks = d.bookmarks;
      if (d.collections) state.collections = d.collections;
    }
  } catch(e) {}
}

// ========== Firestore 保存 ==========
async function saveToFirestore() {
  setStatus('保存中...', 'syncing');
  try {
    await docRef.set({
      bookmarks: state.bookmarks,
      collections: state.collections,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
    saveCache();
    document.getElementById('last-saved').textContent = new Date().toLocaleTimeString('ja-JP');
    setStatus('クラウドに同期済み ☁️', 'synced');
  } catch(e) {
    setStatus('保存エラー — ローカルに保存しました', 'error');
    saveCache();
  }
}

// ========== Firestore リアルタイム同期 ==========
function startSync() {
  setStatus('接続中...', '');

  // まずキャッシュを表示（体感速度向上）
  loadCache();
  renderSidebar();
  renderCards();

  docRef.onSnapshot(snapshot => {
    if (snapshot.exists) {
      const data = snapshot.data();
      state.bookmarks = data.bookmarks || [];
      state.collections = data.collections || state.collections;
      saveCache();
      renderSidebar();
      renderCards();
      document.getElementById('last-saved').textContent =
        data.updatedAt ? new Date(data.updatedAt.toDate()).toLocaleTimeString('ja-JP') : '';
      setStatus('クラウドに同期済み ☁️', 'synced');
      fetchMissingThumbs();
    } else {
      // 初回：サンプルデータを書き込む
      state.bookmarks = [
        { id: 1, url: 'https://anthropic.com', title: 'Anthropic', collection: 'Tech', tags: ['AI', 'tool'], thumb: '🤖' },
        { id: 2, url: 'https://figma.com', title: 'Figma', collection: 'Design', tags: ['design', 'tool'], thumb: '🎨' },
        { id: 3, url: 'https://github.com', title: 'GitHub', collection: 'Tech', tags: ['code', 'dev'], thumb: '💻' },
        { id: 4, url: 'https://zenn.dev', title: 'Zenn', collection: '読み物', tags: ['tech', 'blog'], thumb: '📰' },
      ];
      saveToFirestore();
    }
  }, err => {
    setStatus('オフライン — ローカルデータを表示中', 'error');
    loadCache();
    renderSidebar();
    renderCards();
  });
}

// ========== JSON エクスポート・インポート ==========
function exportJSON() {
  const data = JSON.stringify({ bookmarks: state.bookmarks, collections: state.collections }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'my-raindrop-bookmarks.json';
  a.click();
}

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.bookmarks) state.bookmarks = data.bookmarks;
      if (data.collections) state.collections = data.collections;
      await saveToFirestore();
      renderSidebar();
      renderCards();
      alert(`${state.bookmarks.length}件のブックマークをインポートしました。`);
    } catch(err) {
      alert('JSONファイルの読み込みに失敗しました。');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ========== 描画 ==========
function renderSidebar() {
  const list = document.getElementById('collection-list');
  list.innerHTML = state.collections.map(c => {
    const cnt = c.id === 'all' ? state.bookmarks.length : state.bookmarks.filter(b => b.collection === c.id).length;
    const isDraggable = c.id !== 'all';
    const actions = isDraggable ? `
      <span class="col-actions">
        <button class="col-btn" onclick="event.stopPropagation();openEditCollection('${c.id}')" title="編集">✏️</button>
        <button class="col-btn" onclick="event.stopPropagation();deleteCollection('${c.id}')" title="削除">🗑</button>
      </span>` : '';
    const dragHandle = isDraggable ? `<span style="color:#ccc;cursor:grab;font-size:12px;margin-right:-4px" ondragstart="colDragStart(event,'${c.id}')" draggable="true" onclick="event.stopPropagation()">⠿</span>` : '';
    return `<div class="sidebar-item${state.activeCollection === c.id && !state.activeTag ? ' active' : ''}"
      onclick="setCollection('${c.id}')"
      ondragover="colDragOver(event,'${c.id}')"
      ondragleave="colDragLeave(this)"
      ondrop="event.dataTransfer.getData('type')==='bookmark'?dropToCollection(event,'${c.id}'):colDrop(event,'${c.id}')"
      ondragend="document.querySelectorAll('.sidebar-item').forEach(el=>el.classList.remove('col-drag-above','col-drag-below','drag-over'))"
      >
      ${dragHandle}
      <span style="font-size:14px">${c.icon}</span>
      <span>${c.name}</span>
      <span class="count">${cnt}</span>
      ${actions}
    </div>`;
  }).join('');

  const tagMap = {};
  state.bookmarks.forEach(b => (b.tags || []).forEach(t => { tagMap[t] = (tagMap[t] || 0) + 1; }));
  document.getElementById('tag-list').innerHTML = Object.keys(tagMap).sort().map(t =>
    `<span class="tag" style="${state.activeTag === t ? 'outline:1.5px solid #1a56db' : ''}"
      onclick="setTag('${tagEsc(t)}')"
      oncontextmenu="openCtxMenu(event,'${tagEsc(t)}')">${tagEsc(t)}</span>`
  ).join('');
}

function setCollection(id) { state.activeCollection = id; state.activeTag = null; renderSidebar(); renderCards(); }

// ========== ドラッグ＆ドロップ ==========
function dragStart(event, bookmarkId) {
  event.dataTransfer.setData('bookmarkId', String(bookmarkId));
  event.dataTransfer.setData('type', 'bookmark');
  event.dataTransfer.effectAllowed = 'move';
}

async function dropToCollection(event, collectionId) {
  event.preventDefault();
  if (event.dataTransfer.getData('type') !== 'bookmark') return;
  const id = Number(event.dataTransfer.getData('bookmarkId'));
  const b = state.bookmarks.find(x => x.id === id);
  if (!b || b.collection === collectionId) return;
  b.collection = collectionId === 'all' ? '' : collectionId;
  renderSidebar();
  renderCards();
  await saveToFirestore();
}

// カード並び替え
function cardDragOver(event, targetId) {
  if (event.dataTransfer.getData('type') === 'col') return;
  event.preventDefault();
  document.querySelectorAll('.card').forEach(c => c.classList.remove('card-drag-over'));
  event.currentTarget.classList.add('card-drag-over');
}

async function cardDrop(event, targetId) {
  event.preventDefault();
  event.stopPropagation();
  if (event.dataTransfer.getData('type') === 'col') return;
  const fromId = Number(event.dataTransfer.getData('bookmarkId'));
  if (!fromId || fromId === targetId) { document.querySelectorAll('.card').forEach(c => c.classList.remove('card-drag-over')); return; }
  const fromIdx = state.bookmarks.findIndex(b => b.id === fromId);
  const toIdx   = state.bookmarks.findIndex(b => b.id === targetId);
  if (fromIdx === -1 || toIdx === -1) return;
  const [moved] = state.bookmarks.splice(fromIdx, 1);
  state.bookmarks.splice(toIdx, 0, moved);
  document.querySelectorAll('.card').forEach(c => c.classList.remove('card-drag-over'));
  renderSidebar();
  renderCards();
  await saveToFirestore();
}

// コレクション並び替え
let colDraggingId = null;

function colDragStart(event, colId) {
  colDraggingId = colId;
  event.dataTransfer.setData('type', 'col');
  event.dataTransfer.setData('colId', colId);
  event.dataTransfer.effectAllowed = 'move';
}

function colDragOver(event, targetId) {
  if (!event.dataTransfer.types.includes('type')) return;
  event.preventDefault();
  const el = event.currentTarget;
  el.classList.remove('col-drag-above', 'col-drag-below', 'drag-over');
  const mid = el.getBoundingClientRect().top + el.getBoundingClientRect().height / 2;
  el.classList.add(event.clientY < mid ? 'col-drag-above' : 'col-drag-below');
}

function colDragLeave(el) {
  el.classList.remove('col-drag-above', 'col-drag-below', 'drag-over');
}

async function colDrop(event, targetId) {
  event.preventDefault();
  event.stopPropagation();
  const fromId = event.dataTransfer.getData('colId');
  if (!fromId || fromId === targetId || targetId === 'all') {
    document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('col-drag-above','col-drag-below','drag-over'));
    return;
  }
  const el = event.currentTarget;
  const mid = el.getBoundingClientRect().top + el.getBoundingClientRect().height / 2;
  const insertBefore = event.clientY < mid;
  const fromIdx = state.collections.findIndex(c => c.id === fromId);
  let toIdx = state.collections.findIndex(c => c.id === targetId);
  if (fromIdx === -1 || toIdx === -1) return;
  const [moved] = state.collections.splice(fromIdx, 1);
  toIdx = state.collections.findIndex(c => c.id === targetId);
  state.collections.splice(insertBefore ? toIdx : toIdx + 1, 0, moved);
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('col-drag-above','col-drag-below','drag-over'));
  renderSidebar();
  renderCards();
  await saveToFirestore();
}
function setTag(t) { state.activeTag = state.activeTag === t ? null : t; renderSidebar(); renderCards(); }

function renderCards() {
  const q = (document.getElementById('search-input').value || '').toLowerCase();
  let items = state.bookmarks;
  if (state.activeCollection !== 'all') items = items.filter(b => b.collection === state.activeCollection);
  if (state.activeTag) items = items.filter(b => (b.tags || []).includes(state.activeTag));
  if (q) items = items.filter(b => (b.title + b.url + (b.tags || []).join(' ')).toLowerCase().includes(q));

  const grid = document.getElementById('card-grid');
  if (!items.length) {
    grid.innerHTML = `<div class="empty"><div class="emoji">🔖</div><p>ブックマークがありません</p><p style="margin-top:6px;font-size:12px">「+ 追加」からURLを保存しましょう</p></div>`;
    return;
  }
  grid.innerHTML = items.map(b => `
    <div class="card" draggable="true"
      ondragstart="dragStart(event, ${b.id})"
      ondragover="cardDragOver(event, ${b.id})"
      ondragleave="this.classList.remove('card-drag-over')"
      ondrop="cardDrop(event, ${b.id})">
      <div class="card-actions">
        <button class="card-action-btn" onclick="openEdit(${b.id})" title="編集">✏️</button>
        <button class="card-action-btn danger" onclick="deleteBookmark(${b.id})" title="削除">🗑</button>
      </div>
      <div class="card-thumb">${b.thumb && b.thumb.startsWith('http')
        ? b.thumb.includes('google.com/s2/favicons')
          ? `<img src="${b.thumb}" alt="" style="width:48px;height:48px;object-fit:contain" onerror="this.parentNode.innerHTML='🌐'">`
          : `<img src="${b.thumb}" alt="" style="width:100%;height:100%;object-fit:cover" onerror="this.parentNode.innerHTML='🌐'">`
        : `<span style="font-size:32px">${b.thumb || '🌐'}</span>`
      }</div>
      <div class="card-body">
        <div class="card-title" title="${b.title}">${b.title}</div>
        <div class="card-url">${b.url.replace(/^https?:\/\//, '').split('/')[0]}</div>
        <div class="tags">${(b.tags || []).map(t => `<span class="tag" onclick="setTag('${t}')">${t}</span>`).join('')}</div>
        <a class="card-open-link" href="${b.url}" target="_blank" rel="noopener">開く →</a>
      </div>
    </div>
  `).join('');
}

// ========== モーダル操作 ==========
// ========== URL からタイトル自動取得 ==========
let fetchTimer = null;
function onUrlInput() {
  clearTimeout(fetchTimer);
  const url = document.getElementById('f-url').value.trim();
  if (!url || !url.startsWith('http')) return;
  // 編集中はスキップ（タイトルが既に入っている場合）
  if (state.editingId) return;
  fetchTimer = setTimeout(() => fetchTitle(url), 600);
}

let pendingThumb = null;

// ========== 既存ブックマークのサムネイル自動取得 ==========
function faviconUrl(url) {
  try {
    const domain = new URL(url).hostname;
    return `https://www.google.com/s2/favicons?domain=${domain}&sz=128`;
  } catch(e) { return null; }
}

async function fetchPageMeta(url) {
  let title = null, ogImg = null;

  // Step1: corsproxy.io で直接HTML取得
  try {
    const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`, { signal: AbortSignal.timeout(6000) });
    if (res.ok) {
      const html = await res.text();
      const doc = new DOMParser().parseFromString(html, 'text/html');
      title = doc.querySelector('title')?.textContent?.trim() || null;
      ogImg = doc.querySelector('meta[property="og:image"]')?.getAttribute('content') || null;
    }
  } catch(e) {}

  // Step2: タイトルまたは画像が取れなければ microlink.io で補完
  if (!title || !ogImg) {
    try {
      const res = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}`, { signal: AbortSignal.timeout(8000) });
      const json = await res.json();
      if (!title) title = json?.data?.title || null;
      if (!ogImg) ogImg = json?.data?.image?.url || json?.data?.screenshot?.url || null;
    } catch(e) {}
  }

  return { title, ogImg };
}

async function fetchMissingThumbs() {
  const targets = state.bookmarks.filter(b => !b.thumb || !b.thumb.startsWith('http'));
  if (!targets.length) return;

  let updated = false;
  for (const b of targets) {
    try {
      const { ogImg } = await fetchPageMeta(b.url);
      b.thumb = ogImg || faviconUrl(b.url) || '🌐';
    } catch(e) {
      b.thumb = faviconUrl(b.url) || '🌐';
    }
    updated = true;
    renderCards();
    await new Promise(r => setTimeout(r, 200));
  }
  if (updated) await saveToFirestore();
}

async function fetchTitle(url) {
  document.getElementById('title-fetching').style.display = 'inline';
  pendingThumb = faviconUrl(url);
  try {
    const { title, ogImg } = await fetchPageMeta(url);
    if (title && !document.getElementById('f-title').value) {
      document.getElementById('f-title').value = title;
    }
    if (ogImg) pendingThumb = ogImg;
  } catch(e) {
    pendingThumb = faviconUrl(url);
  } finally {
    document.getElementById('title-fetching').style.display = 'none';
  }
}

// ========== タグ入力 ==========
let selectedTags = [];

function tagEsc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function initTagInput(tags) {
  selectedTags = tags ? [...tags] : [];
  renderTagChips();
  const inp = document.getElementById('f-tags-input');
  if (inp) inp.value = '';
  hideTagDropdown();
}

function renderTagChips() {
  const container = document.getElementById('tag-chips');
  if (!container) return;
  container.innerHTML = selectedTags.map((t, i) =>
    `<span class="tag-chip">${tagEsc(t)}<button class="tag-chip-remove" onmousedown="event.preventDefault();removeTag(${i})">×</button></span>`
  ).join('');
}

function removeTag(index) {
  selectedTags.splice(index, 1);
  renderTagChips();
}

function onTagInput() { showTagDropdown(); }

function onTagKeydown(e) {
  const inp = document.getElementById('f-tags-input');
  const val = inp.value.trim();
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    if (val) addTagToSelected(val);
  } else if (e.key === 'Backspace' && !val && selectedTags.length > 0) {
    selectedTags.pop();
    renderTagChips();
  }
}

function addTagToSelected(tag) {
  const t = tag.trim();
  if (t && !selectedTags.includes(t)) { selectedTags.push(t); renderTagChips(); }
  document.getElementById('f-tags-input').value = '';
  showTagDropdown();
}

function showTagDropdown() {
  const inp = document.getElementById('f-tags-input');
  const query = (inp ? inp.value.trim() : '').toLowerCase();
  const freq = {};
  state.bookmarks.forEach(b => (b.tags || []).forEach(t => { freq[t] = (freq[t] || 0) + 1; }));
  let allTags = Object.keys(freq).sort((a, b) => freq[b] - freq[a]);
  let filtered = query ? allTags.filter(t => t.toLowerCase().includes(query)) : allTags;
  filtered = filtered.filter(t => !selectedTags.includes(t));
  const dropdown = document.getElementById('tag-dropdown');
  if (!dropdown) return;
  let html = '';
  if (!query) {
    const seen = new Set(); const recent = [];
    for (const b of [...state.bookmarks].reverse()) {
      for (const t of (b.tags || [])) {
        if (!seen.has(t) && !selectedTags.includes(t)) { seen.add(t); recent.push(t); }
        if (recent.length >= 6) break;
      }
      if (recent.length >= 6) break;
    }
    if (recent.length > 0) {
      html += `<div class="tag-dropdown-section">最近の</div>`;
      html += recent.map(t => `<div class="tag-dropdown-item" onmousedown="event.preventDefault();addTagToSelected('${tagEsc(t)}')">${tagEsc(t)}</div>`).join('');
    }
    if (filtered.length > 0) {
      html += `<div class="tag-dropdown-section">すべて</div>`;
      html += filtered.map(t => `<div class="tag-dropdown-item" onmousedown="event.preventDefault();addTagToSelected('${tagEsc(t)}')">${tagEsc(t)}<span class="tag-dropdown-count">${freq[t]}</span></div>`).join('');
    }
  } else {
    html += filtered.map(t => `<div class="tag-dropdown-item" onmousedown="event.preventDefault();addTagToSelected('${tagEsc(t)}')">${tagEsc(t)}<span class="tag-dropdown-count">${freq[t]}</span></div>`).join('');
    if (!freq[query] && query) {
      html += `<div class="tag-dropdown-item" onmousedown="event.preventDefault();addTagToSelected('${tagEsc(query)}')" style="color:#888">「${tagEsc(query)}」を追加</div>`;
    }
  }
  if (!html) { hideTagDropdown(); return; }
  dropdown.innerHTML = html;
  dropdown.style.display = 'block';
}

function hideTagDropdown() {
  const d = document.getElementById('tag-dropdown');
  if (d) d.style.display = 'none';
}

function openAddModal() {
  state.editingId = null;
  document.getElementById('modal-title').textContent = 'ブックマークを追加';
  document.getElementById('f-url').value = '';
  document.getElementById('f-title').value = '';
  document.getElementById('title-fetching').style.display = 'none';
  initTagInput([]);
  const sel = document.getElementById('f-col');
  sel.innerHTML = state.collections.filter(c => c.id !== 'all').map(c =>
    `<option value="${c.id}"${c.id === state.activeCollection ? ' selected' : ''}>${c.name}</option>`
  ).join('');
  document.getElementById('modal-add').style.display = 'flex';
}

function openEdit(id) {
  const b = state.bookmarks.find(x => x.id === id);
  if (!b) return;
  state.editingId = id;
  document.getElementById('modal-title').textContent = 'ブックマークを編集';
  document.getElementById('f-url').value = b.url;
  document.getElementById('f-title').value = b.title;
  initTagInput(b.tags || []);
  const sel = document.getElementById('f-col');
  sel.innerHTML = state.collections.filter(c => c.id !== 'all').map(c =>
    `<option value="${c.id}"${c.id === b.collection ? ' selected' : ''}>${c.name}</option>`
  ).join('');
  document.getElementById('modal-add').style.display = 'flex';
}

async function saveBookmark() {
  const url = document.getElementById('f-url').value.trim();
  const title = document.getElementById('f-title').value.trim() || url;
  const col = document.getElementById('f-col').value;
  // 入力中のテキストも保存
  const inputVal = document.getElementById('f-tags-input').value.trim();
  if (inputVal && !selectedTags.includes(inputVal)) selectedTags.push(inputVal);
  const tags = [...selectedTags];
  if (!url) return;
  if (state.editingId) {
    const b = state.bookmarks.find(x => x.id === state.editingId);
    if (b) Object.assign(b, { url, title, collection: col, tags });
  } else {
    state.bookmarks.push({ id: Date.now(), url, title, collection: col, tags, thumb: pendingThumb || randEmoji() });
    pendingThumb = null;
  }
  closeModal('modal-add');
  renderSidebar();
  renderCards();
  await saveToFirestore();
}

async function deleteBookmark(id) {
  if (!confirm('このブックマークを削除しますか？')) return;
  state.bookmarks = state.bookmarks.filter(b => b.id !== id);
  renderSidebar();
  renderCards();
  await saveToFirestore();
}

let editingCollectionId = null;

function openAddCollection() {
  editingCollectionId = null;
  document.getElementById('modal-col-title').textContent = '新しいコレクション';
  document.getElementById('f-col-name').value = '';
  document.getElementById('f-col-icon').value = '';
  document.getElementById('modal-col').style.display = 'flex';
}

function openEditCollection(id) {
  const c = state.collections.find(x => x.id === id);
  if (!c) return;
  editingCollectionId = id;
  document.getElementById('modal-col-title').textContent = 'コレクションを編集';
  document.getElementById('f-col-name').value = c.name;
  document.getElementById('f-col-icon').value = c.icon;
  document.getElementById('modal-col').style.display = 'flex';
}

async function saveCollection() {
  const name = document.getElementById('f-col-name').value.trim();
  const icon = document.getElementById('f-col-icon').value.trim() || '📁';
  if (!name) return;
  if (editingCollectionId) {
    const c = state.collections.find(x => x.id === editingCollectionId);
    if (c) {
      // ブックマークの collection 参照も更新
      state.bookmarks.forEach(b => { if (b.collection === c.id) b.collection = name; });
      Object.assign(c, { id: name, name, icon });
    }
  } else {
    state.collections.push({ id: name, name, icon });
  }
  closeModal('modal-col');
  renderSidebar();
  renderCards();
  await saveToFirestore();
}

async function deleteCollection(id) {
  const c = state.collections.find(x => x.id === id);
  if (!c) return;
  const cnt = state.bookmarks.filter(b => b.collection === id).length;
  const msg = cnt > 0
    ? `「${c.name}」を削除しますか？\n（このコレクションのブックマーク ${cnt} 件は「未分類」になります）`
    : `「${c.name}」を削除しますか？`;
  if (!confirm(msg)) return;
  state.bookmarks.forEach(b => { if (b.collection === id) b.collection = ''; });
  state.collections = state.collections.filter(x => x.id !== id);
  if (state.activeCollection === id) state.activeCollection = 'all';
  renderSidebar();
  renderCards();
  await saveToFirestore();
}

// ========== コンテキストメニュー ==========
let ctxTargetTag = null;

let _ctxJustOpened = false;

function openCtxMenu(event, tag) {
  event.preventDefault();
  event.stopPropagation();
  ctxTargetTag = tag;
  _ctxJustOpened = true;
  const menu = document.getElementById('ctx-menu');
  // まず左上に表示してサイズを確定させる
  menu.style.left = '0px';
  menu.style.top = '0px';
  menu.style.display = 'block';
  requestAnimationFrame(() => {
    const x = Math.min(event.clientX, window.innerWidth - menu.offsetWidth - 8);
    const y = Math.min(event.clientY, window.innerHeight - menu.offsetHeight - 8);
    menu.style.left = x + 'px';
    menu.style.top = y + 'px';
    _ctxJustOpened = false;
  });
}

function closeCtxMenu() {
  if (_ctxJustOpened) return;
  document.getElementById('ctx-menu').style.display = 'none';
  ctxTargetTag = null;
}

function ctxRename() {
  const tag = ctxTargetTag;
  ctxTargetTag = null;
  document.getElementById('ctx-menu').style.display = 'none';
  if (tag) openTagRename(tag);
}

function ctxDelete() {
  const tag = ctxTargetTag;
  ctxTargetTag = null;
  document.getElementById('ctx-menu').style.display = 'none';
  if (tag) deleteTag(tag);
}

document.addEventListener('click', () => closeCtxMenu());
document.addEventListener('contextmenu', () => closeCtxMenu());

// ========== タグ管理 ==========
let editingTagName = null;

function openTagRename(tag) {
  editingTagName = tag;
  document.getElementById('f-tag-name').value = tag;
  document.getElementById('modal-tag').style.display = 'flex';
  setTimeout(() => document.getElementById('f-tag-name').select(), 50);
}

async function saveTagRename() {
  const newName = document.getElementById('f-tag-name').value.trim();
  if (!newName || newName === editingTagName) { closeModal('modal-tag'); return; }
  state.bookmarks.forEach(b => {
    if (!b.tags) return;
    const idx = b.tags.indexOf(editingTagName);
    if (idx !== -1) b.tags[idx] = newName;
  });
  if (state.activeTag === editingTagName) state.activeTag = newName;
  closeModal('modal-tag');
  renderSidebar();
  renderCards();
  await saveToFirestore();
}

async function deleteTag(tag) {
  const cnt = state.bookmarks.filter(b => (b.tags || []).includes(tag)).length;
  if (!confirm(`タグ「${tag}」を削除しますか？\n（${cnt}件のブックマークから除去されます）`)) return;
  state.bookmarks.forEach(b => { if (b.tags) b.tags = b.tags.filter(t => t !== tag); });
  if (state.activeTag === tag) state.activeTag = null;
  renderSidebar();
  renderCards();
  await saveToFirestore();
}

function closeModal(id) { document.getElementById(id).style.display = 'none'; }

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') ['modal-add', 'modal-col', 'modal-tag'].forEach(id => closeModal(id));
});

// ========== PWA インストール ==========
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  if (!localStorage.getItem('pwa_dismissed')) {
    document.getElementById('install-banner').style.display = 'flex';
  }
});
function installPWA() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
    document.getElementById('install-banner').style.display = 'none';
  });
}
function dismissInstall() {
  localStorage.setItem('pwa_dismissed', '1');
  document.getElementById('install-banner').style.display = 'none';
}

// ========== Service Worker 登録 ==========
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// ========== 起動 ==========
startSync();
</script>
